name: Release

# Publish @sofa-buffers/corelib to npm whenever a GitHub Release is published.
# Tag/version bookkeeping stays with the human who cuts the release; this
# workflow only takes the already-tagged tree and ships it.
on:
  release:
    types: [published]

# Trusted Publishing (OIDC) instead of a long-lived npm token:
#   * id-token: write  — lets the runner mint the short-lived OIDC token that
#     npm exchanges for a one-off publish credential. No NPM_TOKEN secret.
#   * contents: read   — checkout only; the release itself is already tagged.
# The npm side must be configured once under the package's
# Settings -> Trusted Publishing, pointing at this repo + `release.yml`
# (and the `npm` environment below).
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@sofa-buffers/corelib
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          # Sets the registry in .npmrc so publish targets the public npm
          # registry. Trusted Publishing needs no token here.
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; the version bundled
      # with Node 24 predates it, so pin a known-good line.
      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - run: npm ci

      # typecheck + test + build also run via prepublishOnly, but doing them as
      # explicit steps surfaces a failure on the right line instead of burying
      # it inside `npm publish`.
      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (ESM + CJS + IIFE + types)
        run: npm run build

      # No NODE_AUTH_TOKEN: npm detects the OIDC environment, exchanges the
      # id-token for a publish credential, and attaches provenance
      # automatically. `access: public` comes from package.json publishConfig.
      - name: Publish to npm (Trusted Publishing)
        run: npm publish
