name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every Node line that is still supported plus the current release:
        #   20 = Iron   (EOL, still allowed by `engines: node >=20`)
        #   22 = Jod    (LTS)
        #   24 = Krypton(LTS)
        #   26 = Current
        node-version: [20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (ESM + CJS + IIFE + types)
        run: npm run build

  # Smoke-test the *built* bundles. This is the only place dist/ is exercised —
  # the vitest suite above covers src/ — so it is what stands between a broken
  # tsup/exports config and a broken publish.
  #
  # Two axes matter, and they are not equally valuable:
  #
  #   * ARTIFACT (high value): package.json ships ESM + CJS + IIFE and resolves
  #     them through an `exports` map. Each is a separate way for a build config
  #     change to break consumers, and nothing else in CI looks at them.
  #   * RUNTIME VERSION (low value): the bundle is dependency-free standard JS.
  #     Whether Bun 1.1 or 1.3 loads it is near-zero risk, so we test the
  #     boundaries (oldest Node that `engines` promises, newest Node) and the
  #     current stable Deno/Bun rather than a broad version fan-out.
  #
  # Note that Node+Deno+Bun canNOT prove the bundle is runtime-agnostic: Deno 2
  # and Bun implement the `node:` builtins and most Node globals deliberately,
  # so an accidental `process`/`Buffer` dependency would pass on all three. The
  # runtime that would catch it is the browser — covered by smoke-browser.mjs,
  # which loads the IIFE with no Node globals in scope.
  #
  # The bundle is built once here and handed to the smoke jobs as an artifact,
  # so those jobs need no npm install at all — they only ever see what a
  # consumer would see.
  smoke-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build (produces the dist/ bundle the smoke test imports)
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  smoke-node:
    needs: smoke-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The boundaries of what `engines: node >=20` promises: the oldest
        # supported line and the current release. The lines in between are
        # already covered by the full vitest suite in build-test.
        node-version: [20, 26]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Smoke test ESM bundle + exports map
        run: node test/smoke.mjs
      - name: Smoke test CJS bundle + exports map
        run: node test/smoke.cjs
      - name: Smoke test IIFE bundle without Node globals
        run: node test/smoke-browser.mjs

  smoke-deno:
    needs: smoke-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Smoke test ESM bundle on Deno
        run: deno run --allow-read test/smoke.mjs

  smoke-bun:
    needs: smoke-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Smoke test ESM bundle on Bun
        run: bun ./test/smoke.mjs
      - name: Smoke test CJS bundle on Bun
        run: bun ./test/smoke.cjs

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Coverage
        run: npm run coverage

      - name: Compute badge JSON from lcov
        run: |
          mkdir -p "$RUNNER_TEMP/badges"
          awk -F: '
            /^LF:/ { lf += $2 } /^LH:/ { lh += $2 }
            /^BRF:/ { brf += $2 } /^BRH:/ { brh += $2 }
            END {
              lines    = (lf  > 0) ? lh  / lf  * 100 : 0
              branches = (brf > 0) ? brh / brf * 100 : 0
              printf "%.1f %.1f\n", lines, branches
            }' coverage/lcov.info > "$RUNNER_TEMP/pct.txt"
          read LINES BRANCHES < "$RUNNER_TEMP/pct.txt"
          color() {
            awk -v v="$1" 'BEGIN { print (v+0 >= 90) ? "brightgreen" : (v+0 >= 75) ? "yellow" : "red" }'
          }
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$LINES" "$(color "$LINES")" > "$RUNNER_TEMP/badges/coverage.json"
          printf '{"schemaVersion":1,"label":"branches","message":"%s%%","color":"%s"}\n' \
            "$BRANCHES" "$(color "$BRANCHES")" > "$RUNNER_TEMP/badges/branches.json"
          echo "coverage=$LINES% branches=$BRANCHES%"

      - name: Publish badges to the badges branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges
          git reset --hard
          cp "$RUNNER_TEMP/badges/coverage.json" "$RUNNER_TEMP/badges/branches.json" .
          git add coverage.json branches.json
          git commit -m "ci: update coverage badges"
          git push -f origin badges
