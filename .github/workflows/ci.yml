name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every Node line that is still supported plus the current release:
        #   20 = Iron   (EOL, still allowed by `engines: node >=20`)
        #   22 = Jod    (LTS)
        #   24 = Krypton(LTS)
        #   26 = Current
        node-version: [20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (ESM + CJS + IIFE + types)
        run: npm run build

  # Smoke-test the *built* bundle on every supported JS runtime. The library is
  # dependency-free and uses only standard JS / Web APIs, so the shipped artifact
  # must run unchanged on Node, Deno and Bun — this guards against an accidental
  # Node-only API sneaking into src/. (The full vitest suite runs on Node above;
  # re-running it per runtime would only duplicate that, and vitest-on-Deno is
  # not well supported — a bundle smoke test is the right granularity here.)
  #
  # The bundle is built once here and handed to the per-runtime smoke jobs as an
  # artifact, so those jobs need no npm install at all — they only ever see what
  # a consumer would see.
  smoke-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build (produces the dist/ bundle the smoke test imports)
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  smoke-node:
    needs: smoke-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Smoke test on Node ${{ matrix.node-version }}
        run: node test/smoke.mjs

  smoke-deno:
    needs: smoke-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest Deno 2 line, the current 2.x, and the unreleased canary as an
        # early warning. Canary is allowed to fail — it is not a release gate.
        deno-version: [v2.0.x, v2.x, canary]
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Smoke test on Deno ${{ matrix.deno-version }}
        continue-on-error: ${{ matrix.deno-version == 'canary' }}
        run: deno run --allow-read test/smoke.mjs

  smoke-bun:
    needs: smoke-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['1.1.x', '1.2.x', latest, canary]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Smoke test on Bun ${{ matrix.bun-version }}
        continue-on-error: ${{ matrix.bun-version == 'canary' }}
        run: bun ./test/smoke.mjs

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Coverage
        run: npm run coverage

      - name: Compute badge JSON from lcov
        run: |
          mkdir -p "$RUNNER_TEMP/badges"
          awk -F: '
            /^LF:/ { lf += $2 } /^LH:/ { lh += $2 }
            /^BRF:/ { brf += $2 } /^BRH:/ { brh += $2 }
            END {
              lines    = (lf  > 0) ? lh  / lf  * 100 : 0
              branches = (brf > 0) ? brh / brf * 100 : 0
              printf "%.1f %.1f\n", lines, branches
            }' coverage/lcov.info > "$RUNNER_TEMP/pct.txt"
          read LINES BRANCHES < "$RUNNER_TEMP/pct.txt"
          color() {
            awk -v v="$1" 'BEGIN { print (v+0 >= 90) ? "brightgreen" : (v+0 >= 75) ? "yellow" : "red" }'
          }
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$LINES" "$(color "$LINES")" > "$RUNNER_TEMP/badges/coverage.json"
          printf '{"schemaVersion":1,"label":"branches","message":"%s%%","color":"%s"}\n' \
            "$BRANCHES" "$(color "$BRANCHES")" > "$RUNNER_TEMP/badges/branches.json"
          echo "coverage=$LINES% branches=$BRANCHES%"

      - name: Publish badges to the badges branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges
          git reset --hard
          cp "$RUNNER_TEMP/badges/coverage.json" "$RUNNER_TEMP/badges/branches.json" .
          git add coverage.json branches.json
          git commit -m "ci: update coverage badges"
          git push -f origin badges
